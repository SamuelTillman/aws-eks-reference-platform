name: Platform Lifecycle (apply / destroy)

# The run title shows exactly what is being done, e.g. "Lifecycle: destroy eks".
run-name: "Lifecycle: ${{ inputs.action }} ${{ inputs.stack }}${{ inputs.action == 'destroy' && format(' [confirm={0}]', inputs.confirm) || '' }}"

# Manual-only teardown/rebuild of the REBUILDABLE layers (ADR-0008). Never runs
# on push or PR. bootstrap/org/identity/logging are never targets. This is the
# one deliberate exception to plan-only CI: the plan is printed before acting,
# and the human dispatch + typed confirm + environment reviewer are the gates.

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Which layer to act on"
        required: true
        type: choice
        options: [networking, eks, argocd, security]
      action:
        description: "apply = create/rebuild (for security, restore monitoring); destroy = tear down (for security, stand down monitoring)"
        required: true
        type: choice
        options: [apply, destroy]
      confirm:
        description: "To DESTROY, type the stack name exactly (networking / eks / argocd / security). Ignored for apply."
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  # Never let an apply and a destroy of the same stack overlap.
  group: lifecycle-${{ github.event.inputs.stack }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  lifecycle:
    name: "${{ github.event.inputs.action }} ${{ github.event.inputs.stack }}"
    runs-on: ubuntu-latest
    # Add a required reviewer to this environment in repo settings for a human
    # gate on every run (see ADR-0008). Until then it runs without approval.
    environment: platform-lifecycle
    env:
      TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
      # Dev-environment profile so a button REBUILD reproduces the optimized
      # cluster (code defaults stay reference-neutral; these override for this
      # environment). Undeclared TF_VAR_* are ignored by stacks that don't use
      # them. Sensitive values (admin egress IP, admin role ARNs) come from
      # secrets so no personal IP or account ID lands in the workflow.
      TF_VAR_node_capacity_type: "SPOT"
      TF_VAR_node_instance_types: '["t3.large","t3a.large","m5.large","m5a.large"]'
      # egress_single_nat (a bool) is passed as -var in the networking step, not
      # here: a bool TF_VAR_ env value is not reliably honored.
      TF_VAR_public_access_cidrs: ${{ secrets.EKS_PUBLIC_ACCESS_CIDRS }}
      TF_VAR_cluster_admin_principal_arns: ${{ secrets.EKS_ADMIN_PRINCIPAL_ARNS }}
      # Pinned Helm chart versions for the argocd stack (public, non-sensitive).
      TF_VAR_argocd_chart_version: "10.1.4"
      TF_VAR_argocd_apps_chart_version: "2.0.5"
    steps:
      - uses: actions/checkout@v4

      - name: Confirm destroy intent
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.stack }}" ]; then
            echo "::error::destroy requires 'confirm' to equal the stack name '${{ github.event.inputs.stack }}' (got '${{ github.event.inputs.confirm }}')."
            exit 1
          fi
          echo "Confirmed destroy of ${{ github.event.inputs.stack }}."

      - name: Configure AWS credentials (OIDC, no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Mask account IDs in logs
        run: |
          for id in $(aws organizations list-accounts --query 'Accounts[].Id' --output text 2>/dev/null); do
            echo "::add-mask::$id"
          done
          [ -n "${id:-}" ] || echo "::warning::could not enumerate org accounts to mask"

      - name: Guard - do not destroy networking while an EKS cluster exists
        if: ${{ github.event.inputs.stack == 'networking' && github.event.inputs.action == 'destroy' }}
        run: |
          dev=$(aws organizations list-accounts --query "Accounts[?Name=='workloads-dev'].Id | [0]" --output text)
          creds=$(aws sts assume-role --role-arn "arn:aws:iam::$dev:role/OrganizationAccountAccessRole" \
            --role-session-name lifecycle-guard --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)
          n=$(AWS_ACCESS_KEY_ID=$(echo "$creds"|cut -f1) AWS_SECRET_ACCESS_KEY=$(echo "$creds"|cut -f2) AWS_SESSION_TOKEN=$(echo "$creds"|cut -f3) \
              aws eks list-clusters --region "$AWS_REGION" --query 'length(clusters)' --output text)
          if [ "$n" != "0" ]; then
            echo "::error::$n EKS cluster(s) still in workloads-dev. Destroy the 'eks' stack before 'networking' (it depends on the VPC/subnets)."
            exit 1
          fi
          echo "No EKS clusters present; safe to destroy networking."

      # argocd lives inside the cluster, whose API endpoint is private + IP-
      # restricted. Temporarily add THIS runner's IP so Terraform can reach it,
      # then remove it again in the always() step below. If the cluster is gone
      # (destroy after eks teardown), skip and just clear state.
      - name: Open cluster endpoint for argocd
        if: ${{ github.event.inputs.stack == 'argocd' }}
        run: |
          set -euo pipefail
          DEV=$(aws organizations list-accounts --query "Accounts[?Name=='workloads-dev'].Id | [0]" --output text)
          ROLE="arn:aws:iam::$DEV:role/OrganizationAccountAccessRole"
          wd() { local c; c=$(aws sts assume-role --role-arn "$ROLE" --role-session-name argo-ip \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text); \
            AWS_ACCESS_KEY_ID=$(echo "$c"|cut -f1) AWS_SECRET_ACCESS_KEY=$(echo "$c"|cut -f2) AWS_SESSION_TOKEN=$(echo "$c"|cut -f3) aws "$@"; }

          if ! wd eks describe-cluster --name refplatform-dev --region "$AWS_REGION" >/dev/null 2>&1; then
            if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
              echo "STATE_RM_ONLY=true" >> "$GITHUB_ENV"
              echo "Cluster gone; argocd destroy will just forget the releases in state."
              exit 0
            fi
            echo "::error::Cluster refplatform-dev not found. Apply the eks stack first."; exit 1
          fi

          RUNNER_IP="$(curl -s https://checkip.amazonaws.com)/32"
          ORIG=$(wd eks describe-cluster --name refplatform-dev --region "$AWS_REGION" \
            --query 'cluster.resourcesVpcConfig.publicAccessCidrs' --output text | tr '\t' ',')
          echo "::add-mask::$RUNNER_IP"
          for c in $(echo "$ORIG" | tr ',' ' '); do echo "::add-mask::$c"; done
          echo "ORIG_CIDRS=$ORIG" >> "$GITHUB_ENV"

          UPD=$(wd eks update-cluster-config --name refplatform-dev --region "$AWS_REGION" \
            --resources-vpc-config "publicAccessCidrs=$ORIG,$RUNNER_IP" --query 'update.id' --output text)
          echo "Added runner IP; waiting for the endpoint update to apply..."
          for i in $(seq 1 40); do
            us=$(wd eks describe-update --name refplatform-dev --region "$AWS_REGION" --update-id "$UPD" --query 'update.status' --output text)
            [ "$us" = "Successful" ] && break
            case "$us" in Failed|Cancelled) echo "::error::endpoint update $us"; exit 1;; esac
            sleep 10
          done
          echo "ENDPOINT_OPENED=true" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform/${{ github.event.inputs.stack }}
        run: terraform init -input=false -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform plan + ${{ github.event.inputs.action }}
        working-directory: terraform/${{ github.event.inputs.stack }}
        run: |
          set -euo pipefail
          STACK="${{ github.event.inputs.stack }}"
          ACTION="${{ github.event.inputs.action }}"
          # networking's single-NAT is a BOOL var; pass it as -var, not via a
          # TF_VAR_ env (a bool TF_VAR_ env value is not reliably honored, unlike
          # string vars). Empty for the other stacks.
          EXTRA=""
          if [ "$STACK" = "networking" ]; then EXTRA="-var=egress_single_nat=true"; fi

          if [ "$STACK" = "security" ]; then
            # security is toggled by enable_* flags, never terraform-destroyed
            # (that would tear down delegated-admin wiring). destroy = stand down.
            if [ "$ACTION" = "destroy" ]; then FLAG=false; else FLAG=true; fi
            VARS="-var enable_guardduty=$FLAG -var enable_securityhub=$FLAG -var enable_access_analyzer=$FLAG"
            echo "== security $ACTION (enable_*=$FLAG): plan =="
            terraform plan $VARS -input=false -no-color
            echo "== apply =="
            terraform apply $VARS -input=false -no-color -auto-approve
          elif [ "$STACK" = "argocd" ]; then
            if [ "${STATE_RM_ONLY:-}" = "true" ]; then
              # cluster already gone: the releases died with it, just drop state
              echo "== argocd: forgetting releases in state (cluster gone) =="
              terraform state rm helm_release.root_app helm_release.argocd 2>/dev/null || true
            elif [ "$ACTION" = "destroy" ]; then
              echo "== argocd destroy plan =="
              terraform plan -destroy -input=false -no-color
              echo "== destroy =="
              terraform destroy -input=false -no-color -auto-approve
            else
              echo "== argocd plan =="
              terraform plan -input=false -no-color
              echo "== apply =="
              terraform apply -input=false -no-color -auto-approve
            fi
          elif [ "$ACTION" = "destroy" ]; then
            echo "== $STACK destroy plan =="
            terraform plan -destroy $EXTRA -input=false -no-color
            echo "== destroy =="
            terraform destroy $EXTRA -input=false -no-color -auto-approve
          else
            echo "== $STACK plan =="
            terraform plan $EXTRA -input=false -no-color
            echo "== apply =="
            terraform apply $EXTRA -input=false -no-color -auto-approve
          fi

      # Always remove the runner IP from the endpoint, even if Terraform failed.
      - name: Restore cluster endpoint (argocd)
        if: ${{ always() && github.event.inputs.stack == 'argocd' && env.ENDPOINT_OPENED == 'true' }}
        run: |
          DEV=$(aws organizations list-accounts --query "Accounts[?Name=='workloads-dev'].Id | [0]" --output text)
          ROLE="arn:aws:iam::$DEV:role/OrganizationAccountAccessRole"
          wd() { local c; c=$(aws sts assume-role --role-arn "$ROLE" --role-session-name argo-ip-restore \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text); \
            AWS_ACCESS_KEY_ID=$(echo "$c"|cut -f1) AWS_SECRET_ACCESS_KEY=$(echo "$c"|cut -f2) AWS_SESSION_TOKEN=$(echo "$c"|cut -f3) aws "$@"; }
          echo "Restoring the endpoint allowlist (removing the runner IP)."
          wd eks update-cluster-config --name refplatform-dev --region "$AWS_REGION" \
            --resources-vpc-config "publicAccessCidrs=$ORIG_CIDRS" >/dev/null \
            || echo "::warning::could not restore publicAccessCidrs; verify the endpoint allowlist manually."
