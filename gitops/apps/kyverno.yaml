# Kyverno admission policy engine (ADR-0014). sync-wave 2: installs the CRDs that
# kyverno-policies (sync-wave 3) then depends on.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: "3.8.2"
    helm:
      releaseName: kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  # The chart ships CRDs with no `spec.conversion`; the API server defaults it to
  # {strategy: None}. ArgoCD then diffs "absent" against "defaulted" and reports
  # the app OutOfSync forever while it is perfectly Healthy. Ignore that one
  # server-defaulted field rather than disabling ServerSideApply, which these
  # large CRDs require. See layer2-issues #7.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
