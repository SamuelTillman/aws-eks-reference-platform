# External Secrets Operator (ADR-0016): syncs AWS Secrets Manager values into
# Kubernetes Secrets, authenticating via EKS Pod Identity (no IRSA annotation, no
# stored credential). sync-wave 0: installs the CRDs that the ClusterSecretStore
# and ExternalSecret (wave 1) depend on, and must be running before Grafana
# (wave 2) looks for its admin Secret.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "2.8.0"
    helm:
      releaseName: external-secrets
      valuesObject:
        # The ServiceAccount name here must match the Pod Identity association
        # created in terraform/eks/external-secrets.tf.
        serviceAccount:
          create: true
          name: external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
