# ClusterSecretStore + ExternalSecrets (ADR-0016). Kept out of apps/ so the root
# app does not apply these CRs before ESO's CRDs exist (wave 0 installs them).
# sync-wave 1: after the operator, before Grafana (wave 2) needs its Secret.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/SamuelTillman/aws-eks-reference-platform.git
    path: gitops/external-secrets
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 15s
        maxDuration: 3m
        factor: 2
