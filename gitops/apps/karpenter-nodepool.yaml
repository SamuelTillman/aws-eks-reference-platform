# The default provisioning config: a spot NodePool + its EC2NodeClass (ADR-0011).
# Kept in gitops/karpenter/ (NOT gitops/apps/) so the root app-of-apps does not
# try to apply these custom resources directly before their CRDs exist.
# sync-wave 1: applied only after the karpenter chart (wave 0) is Healthy, so the
# NodePool/EC2NodeClass CRDs are already installed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-nodepool
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/SamuelTillman/aws-eks-reference-platform.git
    path: gitops/karpenter
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # NodePool/EC2NodeClass are cluster-scoped; retry while CRDs settle.
    retry:
      limit: 10
      backoff:
        duration: 15s
        maxDuration: 3m
        factor: 2
