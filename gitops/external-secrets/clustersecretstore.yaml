# Cluster-wide store pointing at AWS Secrets Manager (ADR-0016).
#
# No `auth` block on purpose: ESO then uses the default AWS credential chain,
# which resolves to the EKS Pod Identity association bound to the
# external-secrets ServiceAccount (terraform/eks/external-secrets.tf). That keeps
# the zero-stored-credential rule intact, no access keys, no IRSA annotation.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
